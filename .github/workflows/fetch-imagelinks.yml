name: Fetch Image Links

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download image links CSV
        run: |
          curl -L "https://docs.google.com/spreadsheets/d/e/2PACX-1vR7OIutQwIUga6KhlDCx1psTnrRkKEDfeFOap_rxES0YEo2RQqbzYOLKQEah8IjEHNjvi7oyMl1qtwQ/pub?output=csv" -o image_links.csv

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add image_links.csv
          git diff --staged --quiet || git commit -m "Update image links"
          git push
